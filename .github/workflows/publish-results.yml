name: Run & publish results

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy matplotlib openpyxl

      - name: Run model
        run: python budget_model.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f budget_model_charts.png budget_model_output.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update model outputs [skip ci]"
          git push
